<h2 mat-dialog-title>Ajouter un livre au catalogue</h2>
<mat-dialog-content>
  <form [formGroup]="BookForm">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Titre</mat-label>
      <input matInput type="text" formControlName="title">
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Prénom d'auteur</mat-label>
      <input matInput type="text" formControlName="firstName">
    </mat-form-field>
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Nom d'auteur</mat-label>
      <input matInput type="text" formControlName="lastName">
    </mat-form-field>
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>ISBN</mat-label>
      <input matInput type="text" formControlName="isbn">
    </mat-form-field>
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Category</mat-label>
      <input matInput type="text" formControlName="category">
    </mat-form-field>
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Status</mat-label>
      <input matInput type="text" formControlName="status">
    </mat-form-field>
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Couverture</mat-label>
      <input matInput type="text" formControlName="frontCoverImg">
    </mat-form-field>
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Exemplaires</mat-label>
      <input matInput type="number" formControlName="copyNumber">
    </mat-form-field>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()">Annuler</button>
  <button mat-raised-button color="primary" [disabled]="BookForm.invalid" (click)="onSave()">Enregistrer</button>
</mat-dialog-actions>
