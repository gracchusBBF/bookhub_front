<h2 mat-dialog-title>Modifier le statut de {{ data.user.firstName }} {{ data.user.lastName }}</h2>

<mat-dialog-content>
  <mat-form-field class="w-full">
    <mat-label>Statut</mat-label>
    <mat-select [(ngModel)]="selectedRole" [compareWith]="compareRoles">
        @for(role of roles; track role.id) {
            <mat-option [value]="role">
                {{ role.roleName }}
            </mat-option>
        }
      </mat-select>
  </mat-form-field>
</mat-dialog-content>

<mat-dialog-actions>
  <button mat-button (click)="onCancel()">Annuler</button>
  <button mat-flat-button color="primary" (click)="onConfirm()">Confirmer</button>
</mat-dialog-actions>
