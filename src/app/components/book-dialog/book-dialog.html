<div class="modal-container">

    <div class="modal-header">
      <button class="close-btn" (click)="onClose()">✕</button>
    </div>
  
    <div class="modal-body">
  
      <!-- Partie gauche 2/3 -->
      <div class="left-panel">
  
        <div class="book-info">
          <img [src]="data.book.frontCoverImg" class="book-cover" alt="Couverture">
          <div class="details">
            <h2 class="book-title">{{ data.book.title }}</h2>
            <p><span class="label">Auteur :</span> {{ data.book.lastName }}</p>
            <p><span class="label">Catégorie :</span> {{ data.book.category }}</p>
            <p>
              <span class="badge" [class.available]="data.book.status === 'AVAILABLE'">
                {{ data.book.status === 'AVAILABLE' ? 'Disponible' : 'Indisponible' }}
              </span>
            </p>
          </div>
        </div>
  
        <div class="synopsis">
          <h3>Synopsis</h3>
          
        </div>
  
      </div>
  
      <!-- Partie droite 1/3 : commentaires -->
      <div class="right-panel">
        <h3>Commentaires</h3>
       <app-commentary-section [bookId]="data.book.id"></app-commentary-section>
      </div>
  
    </div>
  
    <div class="modal-footer">
      <button class="btn-secondary" (click)="onClose()">Fermer</button>
      <button class="btn-primary" (click)="openAddComment()">Ajouter commentaire</button>
    </div>
  
  </div>
