<section class="section-home">
  <mat-form-field class="example-form-field">
    <mat-label>Clearable input</mat-label>
    <input matInput type="text" [(ngModel)]="value" placeholder="Saisir un isbn, un auteur ou titre"/>
    @if (value) {
      <button matSuffix matIconButton aria-label="Clear" (click)="value=''">
        <mat-icon>close</mat-icon>
      </button>
    }
  </mat-form-field>
  <div class="books-container">
    @for (item of bookApiService.books(); track item.id) {
      <app-book-card [book]="item"></app-book-card>
    } @empty {
      <p>Aucun livre trouvé ou chargement en cours...</p>
    }
  </div>
</section>
