<div class="bookhub-librarian-dashboard-container">
  <h1 class="bookhub-librarian-dashboard-title">Tableau de bord</h1>
  <div class="bookhub-librarian-dashboard-card-container">
    <div class="bookhub-librarian-dashboard-essential-informations">
      <mat-card class="bookhub-librarian-dashboard-loanTotal" appearance="outlined">
        <mat-card-header>
          <mat-card-title>Emprunts totale</mat-card-title>
        </mat-card-header>
        <mat-card-content>
          <p>
            500
          </p>
        </mat-card-content>
      </mat-card>
      <mat-card class="bookhub-librarian-dashboard-loanActive" appearance="outlined">
        <mat-card-header>
          <mat-card-title>Emprunts actifs</mat-card-title>
        </mat-card-header>
        <mat-card-content>
          <p>
            250
          </p>
        </mat-card-content>
      </mat-card>
      <!--    </div>-->
    </div>
    <div class="bookhub-librarian-dashboard-overdue">
      <mat-card appearance="outlined">
        <mat-card-header>
          <mat-card-title>Retards</mat-card-title>
        </mat-card-header>
        <mat-card-content>
          <table mat-table [dataSource]="dataSource" class="bookhub-librarian-dashboard-overdue-table">
            <ng-container matColumnDef="userName">
              <th mat-header-cell *matHeaderCellDef> Nom </th>
              <td mat-cell *matCellDef="let element"> {{element.userName}} </td>
            </ng-container>
            <ng-container matColumnDef="deadline">
              <th mat-header-cell *matHeaderCellDef> Date limite </th>
              <td mat-cell *matCellDef="let element"> {{element.deadline}} </td>
            </ng-container>
            <ng-container matColumnDef="book">
              <th mat-header-cell *matHeaderCellDef> Livre </th>
              <td mat-cell *matCellDef="let element"> {{element.book}} </td>
            </ng-container>
            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
          </table>
        </mat-card-content>
        <mat-card-actions>
          <button matButton>Voir la liste de retards</button>
        </mat-card-actions>
      </mat-card>
    </div>
    <div class="bookhub-librarian-dashboard-topTen">
      <mat-card appearance="outlined">
        <mat-card-header>
          <mat-card-title>Top 10 d'emprunts</mat-card-title>
        </mat-card-header>
      </mat-card>
    </div>
    <div class="bookhub-librarian-dashboard-trends">
      <mat-card appearance="outlined">
        <mat-card-header>
          <mat-card-title>Évolutions</mat-card-title>
        </mat-card-header>
      </mat-card>
    </div>
  </div>
</div>
